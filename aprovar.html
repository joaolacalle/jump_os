<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUM OS — Aprovar Conteúdos</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060607;--panel:#0F0F12;--panel2:#14141A;--border:#1E1E26;--border2:#2A2A35;--client-primary:#00E676;--client-dim:rgba(0,230,118,.07);--red:#FF4545;--orange:#FF9F1C;--blue:#5C7CFA;--white:#FFF;--gray1:#9090A0;--gray2:#50505C;--font:'Inter',sans-serif;--mono:'Space Mono',monospace}
body{background:var(--bg);color:var(--white);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
.topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200}
.brand{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase}
.brand span{color:var(--client-primary)}
.topbar-right{display:flex;align-items:center;gap:12px}
.plan-badge{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:var(--client-dim);color:var(--client-primary);border:1px solid rgba(0,230,118,.2);border-radius:20px;padding:4px 12px}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border2);border-radius:24px;padding:4px 12px 4px 4px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--client-primary);color:#000;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center}
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:200px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0}
.sidebar-section{padding:0 10px 16px}
.sidebar-label{font-size:8px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gray2);padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray1);transition:.15s;margin-bottom:1px;text-decoration:none;position:relative}
.nav-item:hover,.nav-item.active{background:var(--panel2);color:var(--white)}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--client-primary);border-radius:0 2px 2px 0}
.sidebar-divider{height:1px;background:var(--border);margin:2px 10px 16px}
.main{flex:1;overflow-y:auto;padding:28px 32px 60px}
.page-header{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.page-tag{font-size:9px;font-weight:800;letter-spacing:4px;color:var(--client-primary);text-transform:uppercase;margin-bottom:5px;font-family:var(--mono)}
.page-header h1{font-size:22px;font-weight:900;letter-spacing:-.5px;text-transform:uppercase}
.section-label{font-size:8px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--gray2);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:7px 14px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--gray2);transition:.15s}
.filter-btn.active{background:var(--client-dim);color:var(--client-primary);border-color:rgba(0,230,118,.3)}
.filter-btn:hover{color:var(--white);border-color:var(--white)}
.approve-all-btn{margin-left:auto;padding:9px 18px;border-radius:8px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;background:var(--client-primary);color:#000;border:none;transition:.15s}
.approve-all-btn:hover{opacity:.88}
/* CONTENT LIST */
.content-list{display:flex;flex-direction:column;gap:16px}
.content-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:.2s}
.content-card:hover{border-color:var(--border2)}
.content-card.approved{border-color:rgba(0,230,118,.3)}
.content-card.rejected{opacity:.5;border-color:rgba(255,69,69,.2)}
.card-main{display:flex;gap:0}
/* PREVIEW */
.card-preview{width:120px;min-height:120px;background:var(--panel2);flex-shrink:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--gray2);position:relative;border-right:1px solid var(--border)}
.preview-icon{font-size:28px;opacity:.2}
.preview-label{font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;opacity:.4}
.preview-badges{position:absolute;top:8px;left:8px;display:flex;flex-direction:column;gap:4px}
.day-badge{background:var(--client-primary);color:#000;font-size:8px;font-weight:900;padding:2px 7px;border-radius:4px;font-family:var(--mono)}
.type-badge{background:rgba(0,0,0,.5);color:#fff;font-size:8px;font-weight:800;padding:2px 7px;border-radius:4px;backdrop-filter:blur(4px)}
/* CONTENT */
.card-content{flex:1;padding:16px 20px;min-width:0}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.card-title{font-size:14px;font-weight:800;line-height:1.3}
.status-pill{font-size:8px;font-weight:800;letter-spacing:2px;text-transform:uppercase;border-radius:10px;padding:3px 10px;flex-shrink:0}
.pill-pending{background:rgba(255,159,28,.12);color:var(--orange)}
.pill-approved{background:rgba(0,230,118,.12);color:var(--client-primary)}
.pill-rejected{background:rgba(255,69,69,.12);color:var(--red)}
.card-meta{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
.meta-item{font-size:10px;color:var(--gray2);display:flex;align-items:center;gap:4px;font-family:var(--mono)}
/* COPY */
.copy-section{margin-bottom:14px}
.copy-label{font-size:8px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gray2);margin-bottom:6px}
.copy-text{font-size:12px;color:var(--gray1);line-height:1.6;border:1px solid var(--border2);border-radius:7px;padding:10px;background:var(--panel2);resize:none;width:100%;outline:none;font-family:var(--font);transition:border-color .2s;min-height:70px}
.copy-text:focus{border-color:var(--client-primary)}
/* ACTIONS */
.card-actions{display:flex;gap:8px;padding:12px 16px;border-top:1px solid var(--border);align-items:center}
.action-group{display:flex;gap:6px;flex:1}
.btn-act{padding:8px 16px;border-radius:7px;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;border:none;transition:.15s}
.btn-approve{background:var(--client-primary);color:#000}
.btn-approve:hover{opacity:.88}
.btn-reject{background:transparent;border:1px solid rgba(255,69,69,.3);color:var(--red)}
.btn-reject:hover{background:rgba(255,69,69,.08)}
.btn-regen{background:transparent;border:1px solid var(--border2);color:var(--orange)}
.btn-regen:hover{background:rgba(255,159,28,.08);border-color:var(--orange)}
.btn-edit{background:transparent;border:1px solid var(--border2);color:var(--gray1)}
.btn-edit:hover{border-color:var(--white);color:var(--white)}
.card-time{font-size:10px;color:var(--gray2);font-family:var(--mono);margin-left:auto}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(6px);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--panel);border:1px solid var(--border2);border-radius:14px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--border)}
.modal-title{font-size:11px;font-weight:800;letter-spacing:3px;text-transform:uppercase}
.modal-close{background:var(--panel2);border:1px solid var(--border2);color:var(--gray1);width:28px;height:28px;border-radius:7px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:22px}
.field-label{font-size:8px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gray2);margin-bottom:7px;display:block;margin-top:14px}
.field-label:first-child{margin-top:0}
.field-textarea,.field-input{width:100%;background:var(--panel2);border:1px solid var(--border2);border-radius:7px;padding:11px 13px;color:var(--white);font-family:var(--font);font-size:12px;outline:none;transition:border-color .2s;resize:none}
.field-textarea{min-height:100px;line-height:1.6}
.field-textarea:focus,.field-input:focus{border-color:var(--client-primary)}
.modal-actions{display:flex;gap:8px;padding:18px 22px;border-top:1px solid var(--border)}
.btn-modal{flex:1;padding:11px;border-radius:7px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;transition:.15s}
.btn-modal-outline{background:transparent;border:1px solid var(--border2);color:var(--gray1)}
.btn-modal-ai{background:rgba(0,230,118,.08);border:1px solid rgba(0,230,118,.3);color:var(--client-primary)}
.btn-modal-save{background:var(--client-primary);color:#000}
/* EMPTY */
.empty-state{text-align:center;padding:60px 20px;color:var(--gray2)}
.empty-icon{font-size:48px;opacity:.2;margin-bottom:16px}
.empty-title{font-size:16px;font-weight:800;color:var(--white);margin-bottom:8px;text-transform:uppercase}
/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;transform:translateX(110%);transition:.3s cubic-bezier(.34,1.56,.64,1);min-width:220px}
.toast.show{transform:translateX(0)}
.toast.success{border-left:2px solid var(--client-primary)}
.toast.info{border-left:2px solid var(--blue)}
.toast.warning{border-left:2px solid var(--orange)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">JUM <span>OS</span></div>
  <div class="topbar-right">
    <div class="plan-badge">Plano Plus</div>
    <div class="user-chip">
      <div class="avatar">JV</div>
      <span style="font-size:12px;font-weight:600">João Vittor</span>
    </div>
  </div>
</header>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Principal</div>
      <a href="dashboard-usuario.html" class="nav-item">▦ Dashboard</a>
      <a href="calendario.html" class="nav-item">◫ Calendário</a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Conteúdo</div>
      <a href="aprovar.html" class="nav-item active">✦ Aprovar<span style="margin-left:auto;background:var(--red);color:#fff;font-size:8px;font-weight:900;border-radius:10px;padding:2px 6px" id="pending-count">3</span></a>
      <a href="historico.html" class="nav-item">◈ Histórico</a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <a href="login.html" class="nav-item" style="color:var(--gray2)">← Sair</a>
    </div>
  </nav>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-tag">↳ Aprovação de conteúdo</div>
        <h1>Aprovar Conteúdos</h1>
        <p style="color:var(--gray1);font-size:13px;margin-top:4px">Revise, edite e aprove cada post antes da publicação automática.</p>
      </div>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterPosts('all',this)">Todos (8)</button>
      <button class="filter-btn" onclick="filterPosts('pending',this)">Pendentes (3)</button>
      <button class="filter-btn" onclick="filterPosts('approved',this)">Aprovados (5)</button>
      <button class="approve-all-btn" onclick="approveAll()">✓ Aprovar todos pendentes</button>
    </div>

    <div class="content-list" id="content-list"></div>
  </main>
</div>

<!-- MODAL EDIÇÃO -->
<div class="modal-overlay" id="editModal" onclick="if(event.target.id==='editModal')closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title-text">Editar post</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">Legenda completa</label>
      <textarea class="field-textarea" id="modal-copy" style="min-height:120px"></textarea>
      <label class="field-label">Hashtags</label>
      <input class="field-input" id="modal-tags" placeholder="#metodoJUMP #marketingdigital ...">
      <label class="field-label">Horário de publicação</label>
      <input class="field-input" type="datetime-local" id="modal-date">
    </div>
    <div class="modal-actions">
      <button class="btn-modal btn-modal-outline" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal btn-modal-ai" onclick="regenAI()">✦ Regerar com IA</button>
      <button class="btn-modal btn-modal-save" onclick="saveModal()">Salvar alterações</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const POSTS = [
  { id:1, day:'03/06', time:'19h07', type:'Feed', icon:'◈', title:'Fechei 3 negócios', status:'pending',
    copy:'Tive 3 negócios.\nStartup de IoT, loja de streetwear, pub.\n\nOs três fecharam.\n\nNão por produto ruim. Por não saber transformar o que eu fazia em cliente que chegava pelo digital.\n\nO JUMP não nasceu do sucesso. Nasceu da conta que eu não quero que você pague.\n\nManda DM com JUMP.',
    keyword:'JUMP', pilar:'Autoridade' },
  { id:2, day:'10/06', time:'19h13', type:'Reel', icon:'▶', title:'O problema que nenhum consultor resolve', status:'pending',
    copy:'O problema que nenhum consultor resolve.\n\nTive 3 negócios. Aprendi do jeito mais caro.\n\nManda DM com MÉTODO.\n\n#empreendedorismo #marketingdigital #metodoJUMP',
    keyword:'MÉTODO', pilar:'Autoridade' },
  { id:3, day:'17/06', time:'12h22', type:'Carrossel', icon:'◧', title:'5 erros no tráfego pago', status:'pending',
    copy:'5 erros que fazem empreendedores perderem dinheiro no tráfego pago.\n\nManda DM com ERROS — vou te enviar um script gratuito para analisar seu caso.\n\n#trafegopago #metaads #joaovittor',
    keyword:'ERROS', pilar:'Educação' },
  { id:4, day:'24/06', time:'19h08', type:'Reel', icon:'▶', title:'A reunião de marketing (humor)', status:'approved',
    copy:'Todo empreendedor já passou por uma reunião de marketing que não levou a nada.\n\nEsse reel é para você.\n\nManda DM com REUNIÃO.\n\n#humor #marketing #empreendedorismo',
    keyword:'REUNIÃO', pilar:'Entretenimento' },
  { id:5, day:'25/06', time:'12h15', type:'Carrossel', icon:'◧', title:'Script de posicionamento', status:'approved',
    copy:'O script de posicionamento que uso em toda consultoria.\n\n3 perguntas. 15 minutos.\n\nManda DM com SCRIPT que eu te envio gratuitamente.\n\n#posicionamento #marketingdigital',
    keyword:'SCRIPT', pilar:'Educação' },
  { id:6, day:'27/06', time:'12h30', type:'Reel', icon:'▶', title:'Seu Instagram não tem problema', status:'approved',
    copy:'Seu Instagram não tem problema. Sua estratégia tem.\n\n119% de alcance é prova disso.\n\nManda DM com MÉTODO.\n\n#instagram #marketingdigital #metodoJUMP',
    keyword:'MÉTODO', pilar:'Autoridade' },
  { id:7, day:'28/06', time:'19h22', type:'Feed', icon:'◈', title:'3 dias. Do Instagram ao cliente.', status:'approved',
    copy:'3 dias.\nDo Instagram ao cliente.\n\nDiagnóstico gratuito. Manda DM com DIAGNOSTICO.\n\n#consultoria #marketingdigital',
    keyword:'DIAGNOSTICO', pilar:'Oferta' },
  { id:8, day:'30/06', time:'19h17', type:'Reel', icon:'▶', title:'VSL — Anúncio Meta Ads', status:'approved',
    copy:'Fechei 3 negócios antes de aprender o que faltava.\n\nHoje ensino o método.\n3 dias. Diagnóstico gratuito — clica no link.\n\n#metodoJUMP',
    keyword:'Link bio', pilar:'Oferta' },
];

let posts = [...POSTS];
let currentFilter = 'all';
let editingId = null;

function filterPosts(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const filtered = currentFilter === 'all' ? posts :
    posts.filter(p => p.status === currentFilter);
  
  const list = document.getElementById('content-list');
  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">✓</div><div class="empty-title">Tudo aprovado!</div><p>Nenhum post pendente de aprovação.</p></div>`;
    return;
  }
  
  list.innerHTML = filtered.map(p => `
    <div class="content-card ${p.status === 'approved' ? 'approved' : p.status === 'rejected' ? 'rejected' : ''}" id="card-${p.id}">
      <div class="card-main">
        <div class="card-preview">
          <div class="preview-icon">${p.icon}</div>
          <div class="preview-label">Aguard. geração</div>
          <div class="preview-badges">
            <div class="day-badge">${p.day}</div>
            <div class="type-badge">${p.type.toUpperCase()}</div>
          </div>
        </div>
        <div class="card-content">
          <div class="card-top">
            <div class="card-title">${p.title}</div>
            <div class="status-pill ${p.status === 'approved' ? 'pill-approved' : p.status === 'rejected' ? 'pill-rejected' : 'pill-pending'}" id="pill-${p.id}">
              ${p.status === 'approved' ? '✓ Aprovado' : p.status === 'rejected' ? '✕ Recusado' : '⏳ Pendente'}
            </div>
          </div>
          <div class="card-meta">
            <div class="meta-item">🕐 ${p.time}</div>
            <div class="meta-item">🏷 ${p.keyword}</div>
            <div class="meta-item">📌 ${p.pilar}</div>
          </div>
          <div class="copy-section">
            <div class="copy-label">Legenda</div>
            <textarea class="copy-text" id="copy-${p.id}" rows="3">${p.copy}</textarea>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <div class="action-group">
          ${p.status !== 'approved' ? `<button class="btn-act btn-approve" onclick="approvePost(${p.id})">✓ Aprovar</button>` : ''}
          ${p.status !== 'rejected' ? `<button class="btn-act btn-reject" onclick="rejectPost(${p.id})">✕ Recusar</button>` : ''}
          <button class="btn-act btn-regen" onclick="regenPost(${p.id})">⟳ Nova imagem</button>
          <button class="btn-act btn-edit" onclick="openEdit(${p.id})">✎ Editar</button>
        </div>
        <div class="card-time">${p.day} · ${p.time}</div>
      </div>
    </div>`).join('');
}

function approvePost(id) {
  posts = posts.map(p => p.id === id ? {...p, status: 'approved'} : p);
  updatePendingCount();
  renderList();
  showToast('Post aprovado! Será publicado no horário agendado.', 'success');
}

function rejectPost(id) {
  posts = posts.map(p => p.id === id ? {...p, status: 'rejected'} : p);
  updatePendingCount();
  renderList();
  showToast('Post recusado. Você pode editar e reenviar.', 'info');
}

function regenPost(id) {
  showToast('Gerando nova imagem via Leonardo AI...', 'info');
  setTimeout(() => showToast('Nova imagem gerada! Atualizando...', 'success'), 2500);
}

function approveAll() {
  posts = posts.map(p => p.status === 'pending' ? {...p, status: 'approved'} : p);
  updatePendingCount();
  renderList();
  showToast('Todos os posts pendentes foram aprovados!', 'success');
}

function updatePendingCount() {
  const n = posts.filter(p => p.status === 'pending').length;
  const el = document.getElementById('pending-count');
  if (el) el.textContent = n;
  document.querySelectorAll('.filter-btn')[0].textContent = `Todos (${posts.length})`;
  document.querySelectorAll('.filter-btn')[1].textContent = `Pendentes (${n})`;
  document.querySelectorAll('.filter-btn')[2].textContent = `Aprovados (${posts.filter(p=>p.status==='approved').length})`;
}

function openEdit(id) {
  editingId = id;
  const p = posts.find(x => x.id === id);
  document.getElementById('modal-title-text').textContent = `Editar — ${p.title}`;
  document.getElementById('modal-copy').value = document.getElementById(`copy-${id}`)?.value || p.copy;
  document.getElementById('editModal').classList.add('open');
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }

function saveModal() {
  if (editingId) {
    const newCopy = document.getElementById('modal-copy').value;
    posts = posts.map(p => p.id === editingId ? {...p, copy: newCopy} : p);
    renderList();
  }
  closeModal();
  showToast('Alterações salvas!', 'success');
}

function regenAI() {
  const copies = [
    'Você depende de indicação pra sobreviver?\n\nIsso funciona até o dia que não funciona mais.\n\nO JUMP te dá o sistema.\n\nManda DM com JUMP.',
    'O problema não é o produto.\nNão é a frequência.\n\nÉ a estratégia.\n\nDiagnóstico gratuito — manda DM com DIAGNOSTICO.'
  ];
  document.getElementById('modal-copy').value = copies[Math.floor(Math.random() * copies.length)];
  showToast('✦ Copy regenerada pela IA!', 'success');
}

function showToast(msg, type = 'info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const colors = { success: 'var(--client-primary)', info: 'var(--blue)', warning: 'var(--orange)' };
  const icons = { success: '✓', info: 'ℹ', warning: '⚠' };
  t.innerHTML = `<span style="color:${colors[type]};font-weight:900">${icons[type]}</span> ${msg}`;
  c.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3500);
}

renderList();
