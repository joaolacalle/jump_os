<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP OS — Tarefas de Serviço</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/jump-ui.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.ord-filtros{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.ord-f{font-family:var(--B);font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:18px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:.15s}
.ord-f.on{border-color:var(--g);background:rgba(var(--g-rgb),.1);color:var(--t1)}
.ord-card{background:var(--ch2);border:1px solid var(--bd);border-radius:13px;padding:16px 18px;margin-bottom:11px;display:flex;align-items:flex-start;gap:14px}
.ord-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:rgba(var(--ac,168,85,247),.14);border:1px solid rgba(var(--ac,168,85,247),.4)}
.ord-body{flex:1;min-width:0}
.ord-rota{font-size:11px;font-family:var(--M);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ord-tarefa{font-size:14px;color:var(--t1);line-height:1.45;margin-bottom:6px}
.ord-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ord-badge{font-size:10px;font-family:var(--M);text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:10px}
.b-pend{background:rgba(251,191,36,.15);color:var(--yel)}
.b-feito{background:rgba(var(--g-rgb),.15);color:var(--g)}
.b-rec{background:rgba(168,85,247,.15);color:var(--lil,#C084FC)}
.b-proc{background:rgba(79,124,255,.15);color:#7c9cff}
.b-erro{background:rgba(248,113,113,.15);color:var(--red,#f87171)}
.b-apr{background:rgba(251,191,36,.15);color:var(--yel,#fbbf24)}
.ord-prog{font-family:var(--M);font-size:9.5px;color:var(--t3);letter-spacing:.5px}
.ord-per{font-family:var(--M);font-size:9px;color:var(--lil,#C084FC);background:rgba(168,85,247,.12);padding:2px 7px;border-radius:20px;letter-spacing:.5px}
.ord-info{font-family:var(--M);font-size:9.5px;color:var(--t3);margin-top:7px;line-height:1.6;letter-spacing:.3px}
.ord-info b{color:var(--t2);font-weight:700}
.ord-bar{height:4px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden;margin-top:6px;max-width:220px}
.ord-bar i{display:block;height:100%;background:var(--g);border-radius:3px;transition:width .3s}
.ord-tempo{font-size:11px;color:var(--t3);font-family:var(--M)}
.ord-acts{display:flex;flex-direction:column;gap:7px;align-items:flex-end}
.ord-empty{text-align:center;padding:60px 20px;color:var(--t3)}
</style>
</head>
<body>
<div class="grain"></div>
<div class="loading" id="loading"><div class="ld-spin"></div><div class="ld-t">Carregando ordens...</div></div>
<div class="app">
<main class="main">
  <div class="hd"><div><div class="hd-hello" id="hd-hello">Tarefas de Serviço</div><h1 class="hd-h">Suas <em>tarefas de serviço</em></h1></div></div>
  <p style="font-size:13.5px;color:var(--t2);line-height:1.6;margin:-8px 0 18px;max-width:640px">Tudo que os agentes têm para fazer fica aqui — as ordens que você criou e as que um agente passou para outro. Clique em "Executar agora" para abrir o agente e tocar a tarefa.</p>

  <div class="ord-filtros">
    <button class="ord-f on" data-f="ativa" onclick="filtrar('ativa',this)">Ativas</button>
    <button class="ord-f" data-f="" onclick="filtrar('',this)">Todas</button>
    <button class="ord-f" data-f="concluida" onclick="filtrar('concluida',this)">Concluídas</button>
    <button class="ord-f" data-f="recorrente" onclick="filtrar('recorrente',this)">Recorrentes</button>
    <button class="ord-f" data-f="videos" onclick="filtrar('videos',this)">🎬 Vídeos por IA</button>
  </div>

  <div id="ord-lista"><div style="font-size:13px;color:var(--t3);font-family:var(--M)">Carregando...</div></div>
</main>
</div>

<script src="assets/jump-core.js"></script>
<script src="assets/jump-guia.js"></script>
<script>
let CTX={}, TODAS=[], FILTRO='ativa';
const AGINFO={
  identidade:{ico:'🎨',n:'Identidade',nc:'34,211,238'},
  mercado:{ico:'🔍',n:'Mercado',nc:'79,124,255'},
  diagnostico:{ico:'📊',n:'Diagnóstico',nc:'45,212,191'},
  estrategia:{ico:'📋',n:'Estratégia',nc:'251,191,36'},
  criativo:{ico:'🖼',n:'Criativo',nc:'244,114,182'},
  publicacao:{ico:'📅',n:'Publicação',nc:'251,146,60'},
  trafego:{ico:'📢',n:'Tráfego',nc:'248,113,113'},
  video:{ico:'🎬',n:'Editor de Vídeo',nc:'163,230,53'},
  usuario:{ico:'👤',n:'Você',nc:'168,85,247'},
};

(async function(){
  const s=await JUMP.guard(['usuario','supervisor','admin']);
  if(!s)return;
  CTX=s;
  JUMP.sidebar('ordens');
  JUMP.setUser(CTX.viewCliente||CTX.cliente,CTX.user);
  document.getElementById('loading').classList.add('hide');
  carregar();
})();

function tempoDecorrido(iso){
  if(!iso)return'';
  const d=new Date(iso), agora=new Date(), dif=Math.floor((agora-d)/1000);
  if(dif<3600)return'há '+Math.max(1,Math.floor(dif/60))+' min';
  if(dif<86400)return'há '+Math.floor(dif/3600)+'h';
  return'há '+Math.floor(dif/86400)+' dia(s)';
}

let VIDEOS=[];
async function carregar(){
  try{JUMPGUIA.init(CTX.viewId||CTX.user.id)}catch(e){}
  try{
    const d=await JUMP.api('minhas_ordens',{},CTX.token);
    TODAS=d.ordens||[];
    // carrega também os vídeos (histórico de execuções)
    try{const dv=await JUMP.apiSilencioso('video_meus_jobs',{},CTX.token);VIDEOS=(dv&&dv.jobs)||[];}catch(e){VIDEOS=[];}
    render();
  }catch(e){document.getElementById('ord-lista').innerHTML='<div class="ord-empty">Erro ao carregar.</div>';}
}

function filtrar(f,btn){
  FILTRO=f;
  document.querySelectorAll('.ord-f').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
  render();
}

const ST_ORD={
  aguardando_aprovacao:['b-apr','aguardando sua aprovação'],
  pendente:['b-pend','pendente'],
  processando:['b-proc','processando…'],
  erro:['b-erro','erro'],
  concluida:['b-feito','concluída'],
};
async function aprovarOrdem(id,btn){
  btn.disabled=true;btn.textContent='…';
  try{
    const o=TODAS.find(x=>String(x.id)===String(id));
    const uid=CTX.viewId||CTX.user.id;
    // APROVAR A ESTRATÉGIA: promove o plano (proposto → rascunho = entra no calendário)
    // e dispara as ordens: Designer (SÓ imagens) e Publicação.
    if(o&&o.tarefa==='aprovar_estrategia'){
      const{data:props}=await JUMP.sb.from('conteudos').select('id,formato,data_sugerida').eq('user_id',uid).eq('status','proposto');
      const lista=props||[];
      if(lista.length){
        await JUMP.sb.from('conteudos').update({status:'rascunho'}).eq('user_id',uid).eq('status','proposto');
      }
      // CICLO SEMANAL: o mês entra no calendário como arquitetura; a semana é detalhada
      // (copy/headline/roteiro) pela Estratégia e só então o Designer gera as artes.
      const lim=Date.now()+7*864e5;
      const daSemana=lista.filter(c=>!c.data_sugerida||new Date(c.data_sugerida).getTime()<=lim);
      // período de referência (aparece no card: "Semana 3 · julho de 2026")
      const _h=new Date();
      const periodo='Semana '+Math.ceil(_h.getDate()/7)+' · '+_h.toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
      const novas=[];
      if(daSemana.length)novas.push({user_id:uid,de_agente:'estrategia',para_agente:'estrategia',tarefa:'detalhar_semana',detalhe:'Escrever copy e roteiros da semana ('+daSemana.length+' post(s))',status:'pendente',total:daSemana.length,progresso:0,payload:{periodo}});
      // dedup: nunca criar duas ordens de publicação (o print do João mostrou 5/5 e 6/6 duplicadas)
      const{data:jaPub}=await JUMP.sb.from('ordens_servico').select('id').eq('user_id',uid).eq('tarefa','publicar_calendario').in('status',['pendente','processando']).limit(1);
      if(lista.length&&!(jaPub&&jaPub.length))novas.push({user_id:uid,de_agente:'estrategia',para_agente:'publicacao',tarefa:'publicar_calendario',detalhe:'Publicar o calendário nas datas agendadas ('+lista.length+' post(s))',status:'pendente',total:lista.length,progresso:0,payload:{periodo}});
      if(novas.length)await JUMP.sb.from('ordens_servico').insert(novas);
      await JUMP.sb.from('ordens_servico').update({status:'concluida',concluida_em:new Date().toISOString()}).eq('id',id);
      JUMP.toast('✓ Estratégia aprovada! Está no calendário.');
      try{JUMPGUIA.dica('estrategia_aprovada','Pronto! O mês está no calendário. Agora abra o <b>Agente de Estratégia</b> e clique em <b>Escrever a copy da semana</b> — em seguida o Designer gera as artes automaticamente.','Estratégia aprovada')}catch(e){}
      await carregar();
      return;
    }
    const{error}=await JUMP.sb.from('ordens_servico').update({status:'pendente'}).eq('id',id);
    if(error)throw error;
    if(o)o.status='pendente';
    JUMP.toast('✓ Sugestão aprovada — a sequência dos agentes foi disparada.');
    render();
  }catch(e){btn.disabled=false;btn.textContent='✓ Aprovar';JUMP.toast('Não foi possível aprovar. Tente de novo.','err')}
}
function render(){
  agendarRefresh(); // tempo real: mantém o board atualizado enquanto houver tarefa ativa
  const wrap=document.getElementById('ord-lista');
  // FILTRO ESPECIAL: vídeos (histórico de execuções do Editor)
  if(FILTRO==='videos'){renderVideos(wrap);return;}
  let lista=TODAS;
  if(FILTRO==='ativa')lista=TODAS.filter(o=>o.status!=='concluida');
  else if(FILTRO==='concluida')lista=TODAS.filter(o=>o.status==='concluida');
  else if(FILTRO==='recorrente')lista=TODAS.filter(o=>o.recorrencia);

  if(!lista.length){
    const vazio=FILTRO==='ativa'?'Nenhuma tarefa ativa':(FILTRO==='concluida'?'Nenhuma tarefa concluída ainda':'Nenhuma tarefa aqui');
    wrap.innerHTML='<div class="ord-empty"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:15px;color:var(--t1);font-weight:700;margin-bottom:6px">'+vazio+'</div><div style="font-size:13px">Crie tarefas pelo botão "Incluir tarefa" no chat de qualquer agente, ou peça uma estratégia ao Estrategista.</div></div>';
    return;
  }
  wrap.innerHTML=lista.map(o=>{
    const ag=AGINFO[o.para_agente]||{ico:'🤖',n:o.para_agente,nc:'168,85,247'};
    const de=AGINFO[o.de_agente]||{n:o.de_agente};
    const st=ST_ORD[o.status]||['b-pend',o.status||'pendente'];
    const badge='<span class="ord-badge '+st[0]+'">'+st[1]+'</span>';
    const rec=o.recorrencia?`<span class="ord-badge b-rec">↻ ${o.recorrencia}</span>`:'';
    const tempo=o.status==='concluida'&&o.concluida_em?'concluída '+tempoDecorrido(o.concluida_em):'criada '+tempoDecorrido(o.created_at);
    const _d=new Date(o.created_at);
    const quando=isNaN(_d)?'—':_d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'})+' às '+_d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
    const _pl=o.payload||{};
    const per=_pl.periodo?`<span class="ord-per">🗓 ${JUMP.esc(_pl.periodo)}</span>`:'';
    // Progresso (N/T) só faz sentido em LOTE (imagens/publicações) — não em tarefa simples.
    const ehLote=['criar_post','publicar_calendario','detalhar_semana'].indexOf(o.tarefa)>=0;
    const tot=ehLote?Number(o.total||0):0,pg=Number(o.progresso||0);
    const prog=(tot>1&&o.status!=='concluida')?`<span class="ord-prog">${pg}/${tot}</span>`:'';
    const barra=(tot>1&&o.status!=='concluida')?`<div class="ord-bar"><i style="width:${Math.round((pg/tot)*100)}%"></i></div>`:'';
    // registro de execução próprio (de==para): mostra "X executou" em vez de "X → X"
    let rota=(o.de_agente===o.para_agente)?(ag.n+' executou'):((de.n||'—')+' → '+ag.n);
    if(o.tarefa==='aprovar_estrategia')rota='Estratégia → Sua aprovação';
    if(o.tarefa==='detalhar_semana')rota='Estratégia → Copy da semana';
    const podeExec=(o.status==='pendente'||o.status==='erro');
    const precisaAprovar=(o.status==='aguardando_aprovacao');
    return `<div class="ord-card" style="--ac:${ag.nc}">
      <div class="ord-ico">${ag.ico}</div>
      <div class="ord-body">
        <div class="ord-rota">${rota}</div>
        <div class="ord-tarefa">${JUMP.esc(o.detalhe||o.tarefa||'')}</div>
        <div class="ord-meta">${badge}${rec}${prog}${per}<span class="ord-tempo">${tempo}</span></div>${barra}
        <div class="ord-info">👤 Gerado por <b>${de.n||o.de_agente||'—'}</b> · ⚡ Executa: <b>${ag.n}</b> · 📅 ${quando}</div>
      </div>
      <div class="ord-acts">
        ${precisaAprovar?`<button class="btn btn-g btn-sm" onclick="aprovarOrdem('${o.id}',this)">✓ ${o.tarefa==='aprovar_estrategia'?'Aprovar estratégia':'Aprovar sugestão'}</button>`:''}
        ${podeExec?`<a class="btn btn-g btn-sm" href="agentes.html?agente=${o.para_agente}">${o.status==='erro'?'Tentar de novo →':'Executar agora →'}</a>`:''}
        <button class="btn btn-o btn-sm" onclick="cancelar('${o.id}')">Remover</button>
      </div>
    </div>`;
  }).join('');
}

let REFRESH_TIMER=null;
function temAtivo(){
  const ordAtiva=(TODAS||[]).some(o=>o.status==='pendente'||o.status==='processando');
  const vidAtivo=(VIDEOS||[]).some(j=>j.status==='processando'||j.status==='transcrevendo');
  return ordAtiva||vidAtivo;
}
function agendarRefresh(){
  if(REFRESH_TIMER){clearTimeout(REFRESH_TIMER);REFRESH_TIMER=null;}
  if(document.hidden||!temAtivo())return; // nada em andamento (ou aba oculta): para sozinho
  REFRESH_TIMER=setTimeout(async()=>{
    REFRESH_TIMER=null;
    try{const d=await JUMP.apiSilencioso('minhas_ordens',{},CTX.token);if(d&&d.ordens)TODAS=d.ordens;}catch(e){}
    try{const dv=await JUMP.apiSilencioso('video_meus_jobs',{},CTX.token);if(dv&&dv.jobs)VIDEOS=dv.jobs;}catch(e){}
    render(); // o próprio render re-agenda enquanto ainda houver tarefa ativa
  },12000);
}
// ao voltar para a aba, atualiza na hora
document.addEventListener('visibilitychange',()=>{if(!document.hidden&&CTX&&CTX.token)carregar();});
function renderVideos(wrap){
  const ehGestor=CTX.cliente&&(CTX.cliente.role==='admin'||CTX.cliente.role==='supervisor');
  if(!VIDEOS.length){
    wrap.innerHTML='<div class="ord-empty"><div style="font-size:40px;margin-bottom:12px">🎬</div><div style="font-size:15px;color:var(--t1);font-weight:700;margin-bottom:6px">Nenhum vídeo ainda</div><div style="font-size:13px">Use o Editor de Vídeo no chat dos agentes para criar.</div></div>';
    return;
  }
  const stInfo={
    pronto:{txt:'pronto',cls:'b-feito'},
    erro:{txt:'erro',cls:'b-pend',cor:'var(--red)'},
    transcrevendo:{txt:'gerando legendas...',cls:'b-pend'},
    processando:{txt:'processando...',cls:'b-pend'},
  };
  wrap.innerHTML=VIDEOS.map(j=>{
    const st=stInfo[j.status]||{txt:j.status,cls:'b-pend'};
    const dl=j.salvo_url||j.resultado_url;
    const baixar=(j.status==='pronto'&&dl)?`<button class="btn btn-g btn-sm" onclick="baixarVid('${j.id}','${j.salvo_url||''}','${j.resultado_url||''}')">⬇ Baixar</button>`:'';
    const diag=(ehGestor&&j.status==='erro')?`<button class="btn btn-o btn-sm" onclick="diagVid('${j.id}')">🔍 Diagnóstico</button>`:'';
    const errInfo=(j.status==='erro'&&j.erro)?`<div style="font-size:11px;color:var(--red);font-family:var(--M);margin-top:4px">${JUMP.esc(j.erro).slice(0,120)}</div>`:'';
    return `<div class="ord-card" style="--ac:163,230,53">
      <div class="ord-ico">🎬</div>
      <div class="ord-body">
        <div class="ord-rota">Editor de Vídeo</div>
        <div class="ord-tarefa">${JUMP.esc(j.titulo||'Vídeo')}</div>
        <div class="ord-meta"><span class="ord-badge ${st.cls}" ${st.cor?`style="color:${st.cor}"`:''}>${st.txt}</span><span class="ord-tempo">criado ${tempoDecorrido(j.created_at)}</span></div>
        ${errInfo}
      </div>
      <div class="ord-acts">${baixar}${diag}</div>
    </div>`;
  }).join('');
}
async function baixarVid(jobId,salvoUrl,shotUrl){
  const url=salvoUrl||shotUrl;
  if(!url){JUMP.toast('Vídeo indisponível','err');return;}
  JUMP.toast('Baixando...');
  await JUMP.baixarArquivo(url,'video_jump_'+jobId+'.mp4');
  try{await JUMP.api('video_baixado',{job_id:jobId},CTX.token);}catch(e){}
}
async function diagVid(jobId){
  try{
    const d=await JUMP.api('video_diagnostico',{},CTX.token);
    alert(JSON.stringify(d.diagnostico||d,null,2));
  }catch(e){JUMP.toast('Erro no diagnóstico','err');}
}
async function cancelar(id){
  if(!confirm('Remover esta ordem?'))return;
  try{
    await JUMP.api('cancelar_ordem',{ordem_id:id},CTX.token);
    JUMP.toast('Ordem removida');
    TODAS=TODAS.filter(o=>o.id!==id);render();
  }catch(e){JUMP.toast('Erro ao remover','err');}
}
</script>
</body>
</html>
