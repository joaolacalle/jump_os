<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP OS — Tarefas de Serviço</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/jump-ui.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.ord-filtros{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.ord-f{font-family:var(--B);font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:18px;border:1px solid var(--bd);background:transparent;color:var(--t2);cursor:pointer;transition:.15s}
.ord-f.on{border-color:var(--g);background:rgba(var(--g-rgb),.1);color:var(--t1)}
.ord-card{background:var(--ch2);border:1px solid var(--bd);border-radius:13px;padding:16px 18px;margin-bottom:11px;display:flex;align-items:flex-start;gap:14px}
.ord-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;background:rgba(var(--ac,168,85,247),.14);border:1px solid rgba(var(--ac,168,85,247),.4)}
.ord-body{flex:1;min-width:0}
.ord-rota{font-size:11px;font-family:var(--M);color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px}
.ord-tarefa{font-size:14px;color:var(--t1);line-height:1.45;margin-bottom:6px}
.ord-meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.ord-badge{font-size:10px;font-family:var(--M);text-transform:uppercase;letter-spacing:.5px;padding:3px 9px;border-radius:10px}
.b-pend{background:rgba(251,191,36,.15);color:var(--yel)}
.b-feito{background:rgba(var(--g-rgb),.15);color:var(--g)}
.b-rec{background:rgba(168,85,247,.15);color:var(--lil,#C084FC)}
.ord-tempo{font-size:11px;color:var(--t3);font-family:var(--M)}
.ord-acts{display:flex;flex-direction:column;gap:7px;align-items:flex-end}
.ord-empty{text-align:center;padding:60px 20px;color:var(--t3)}
</style>
</head>
<body>
<div class="grain"></div>
<div class="loading" id="loading"><div class="ld-spin"></div><div class="ld-t">Carregando ordens...</div></div>
<div class="app">
<main class="main">
  <div class="hd"><div><div class="hd-hello" id="hd-hello">Tarefas de Serviço</div><h1 class="hd-h">Suas <em>tarefas de serviço</em></h1></div></div>
  <p style="font-size:13.5px;color:var(--t2);line-height:1.6;margin:-8px 0 18px;max-width:640px">Tudo que os agentes têm para fazer fica aqui — as ordens que você criou e as que um agente passou para outro. Clique em "Executar agora" para abrir o agente e tocar a tarefa.</p>

  <div class="ord-filtros">
    <button class="ord-f on" data-f="pendente" onclick="filtrar('pendente',this)">Pendentes</button>
    <button class="ord-f" data-f="" onclick="filtrar('',this)">Todas</button>
    <button class="ord-f" data-f="concluida" onclick="filtrar('concluida',this)">Concluídas</button>
    <button class="ord-f" data-f="recorrente" onclick="filtrar('recorrente',this)">Recorrentes</button>
    <button class="ord-f" data-f="videos" onclick="filtrar('videos',this)">🎬 Vídeos por IA</button>
  </div>

  <div id="ord-lista"><div style="font-size:13px;color:var(--t3);font-family:var(--M)">Carregando...</div></div>
</main>
</div>

<script src="assets/jump-core.js"></script>
<script>
let CTX={}, TODAS=[], FILTRO='pendente';
const AGINFO={
  identidade:{ico:'🎨',n:'Identidade',nc:'34,211,238'},
  mercado:{ico:'🔍',n:'Mercado',nc:'79,124,255'},
  diagnostico:{ico:'📊',n:'Diagnóstico',nc:'45,212,191'},
  estrategia:{ico:'📋',n:'Estratégia',nc:'251,191,36'},
  criativo:{ico:'🖼',n:'Criativo',nc:'244,114,182'},
  publicacao:{ico:'📅',n:'Publicação',nc:'251,146,60'},
  trafego:{ico:'📢',n:'Tráfego',nc:'248,113,113'},
  video:{ico:'🎬',n:'Editor de Vídeo',nc:'163,230,53'},
  usuario:{ico:'👤',n:'Você',nc:'168,85,247'},
};

(async function(){
  const s=await JUMP.guard(['usuario','supervisor','admin']);
  if(!s)return;
  CTX=s;
  JUMP.sidebar('ordens');
  JUMP.setUser(CTX.viewCliente||CTX.cliente,CTX.user);
  document.getElementById('loading').classList.add('hide');
  carregar();
})();

function tempoDecorrido(iso){
  if(!iso)return'';
  const d=new Date(iso), agora=new Date(), dif=Math.floor((agora-d)/1000);
  if(dif<3600)return'há '+Math.max(1,Math.floor(dif/60))+' min';
  if(dif<86400)return'há '+Math.floor(dif/3600)+'h';
  return'há '+Math.floor(dif/86400)+' dia(s)';
}

let VIDEOS=[];
async function carregar(){
  try{
    const d=await JUMP.api('minhas_ordens',{},CTX.token);
    TODAS=d.ordens||[];
    // carrega também os vídeos (histórico de execuções)
    try{const dv=await JUMP.apiSilencioso('video_meus_jobs',{},CTX.token);VIDEOS=(dv&&dv.jobs)||[];}catch(e){VIDEOS=[];}
    render();
  }catch(e){document.getElementById('ord-lista').innerHTML='<div class="ord-empty">Erro ao carregar.</div>';}
}

function filtrar(f,btn){
  FILTRO=f;
  document.querySelectorAll('.ord-f').forEach(x=>x.classList.remove('on'));
  btn.classList.add('on');
  render();
}

function render(){
  const wrap=document.getElementById('ord-lista');
  // FILTRO ESPECIAL: vídeos (histórico de execuções do Editor)
  if(FILTRO==='videos'){renderVideos(wrap);return;}
  let lista=TODAS;
  if(FILTRO==='pendente')lista=TODAS.filter(o=>o.status==='pendente');
  else if(FILTRO==='concluida')lista=TODAS.filter(o=>o.status==='concluida');
  else if(FILTRO==='recorrente')lista=TODAS.filter(o=>o.recorrencia);

  if(!lista.length){
    wrap.innerHTML='<div class="ord-empty"><div style="font-size:40px;margin-bottom:12px">📋</div><div style="font-size:15px;color:var(--t1);font-weight:700;margin-bottom:6px">Nenhuma tarefa '+(FILTRO==='pendente'?'pendente':'aqui')+'</div><div style="font-size:13px">Crie tarefas pelo botão "Incluir tarefa" no chat de qualquer agente.</div></div>';
    return;
  }
  wrap.innerHTML=lista.map(o=>{
    const ag=AGINFO[o.para_agente]||{ico:'🤖',n:o.para_agente,nc:'168,85,247'};
    const de=AGINFO[o.de_agente]||{n:o.de_agente};
    const badge=o.status==='concluida'?'<span class="ord-badge b-feito">concluída</span>':'<span class="ord-badge b-pend">pendente</span>';
    const rec=o.recorrencia?`<span class="ord-badge b-rec">↻ ${o.recorrencia}</span>`:'';
    const tempo=o.status==='concluida'&&o.concluida_em?'concluída '+tempoDecorrido(o.concluida_em):'criada '+tempoDecorrido(o.created_at);
    // registro de execução próprio (de==para): mostra "X executou" em vez de "X → X"
    const rota=(o.de_agente===o.para_agente)?(ag.n+' executou'):((de.n||'—')+' → '+ag.n);
    return `<div class="ord-card" style="--ac:${ag.nc}">
      <div class="ord-ico">${ag.ico}</div>
      <div class="ord-body">
        <div class="ord-rota">${rota}</div>
        <div class="ord-tarefa">${JUMP.esc(o.detalhe||o.tarefa||'')}</div>
        <div class="ord-meta">${badge}${rec}<span class="ord-tempo">${tempo}</span></div>
      </div>
      <div class="ord-acts">
        ${o.status==='pendente'?`<a class="btn btn-g btn-sm" href="agentes.html?agente=${o.para_agente}">Executar agora →</a>`:''}
        <button class="btn btn-o btn-sm" onclick="cancelar('${o.id}')">Remover</button>
      </div>
    </div>`;
  }).join('');
}

let VID_TIMER=null;
function agendarRefreshVideos(){
  if(VID_TIMER){clearTimeout(VID_TIMER);VID_TIMER=null;}
  const pend=(VIDEOS||[]).some(j=>j.status==='processando'||j.status==='transcrevendo');
  if(!pend)return; // nada em andamento: para sozinho
  VID_TIMER=setTimeout(async()=>{
    VID_TIMER=null;
    try{const dv=await JUMP.apiSilencioso('video_meus_jobs',{},CTX.token);if(dv&&dv.jobs)VIDEOS=dv.jobs;}catch(e){}
    if(FILTRO==='videos')render(); // re-renderiza (o próprio renderVideos re-agenda se ainda houver pendente)
    else agendarRefreshVideos();   // continua acompanhando em segundo plano
  },12000);
}
function renderVideos(wrap){
  agendarRefreshVideos(); // auto-atualiza o "processando" sem o usuário precisar dar F5
  const ehGestor=CTX.cliente&&(CTX.cliente.role==='admin'||CTX.cliente.role==='supervisor');
  if(!VIDEOS.length){
    wrap.innerHTML='<div class="ord-empty"><div style="font-size:40px;margin-bottom:12px">🎬</div><div style="font-size:15px;color:var(--t1);font-weight:700;margin-bottom:6px">Nenhum vídeo ainda</div><div style="font-size:13px">Use o Editor de Vídeo no chat dos agentes para criar.</div></div>';
    return;
  }
  const stInfo={
    pronto:{txt:'pronto',cls:'b-feito'},
    erro:{txt:'erro',cls:'b-pend',cor:'var(--red)'},
    transcrevendo:{txt:'gerando legendas...',cls:'b-pend'},
    processando:{txt:'processando...',cls:'b-pend'},
  };
  wrap.innerHTML=VIDEOS.map(j=>{
    const st=stInfo[j.status]||{txt:j.status,cls:'b-pend'};
    const dl=j.salvo_url||j.resultado_url;
    const baixar=(j.status==='pronto'&&dl)?`<button class="btn btn-g btn-sm" onclick="baixarVid('${j.id}','${j.salvo_url||''}','${j.resultado_url||''}')">⬇ Baixar</button>`:'';
    const diag=(ehGestor&&j.status==='erro')?`<button class="btn btn-o btn-sm" onclick="diagVid('${j.id}')">🔍 Diagnóstico</button>`:'';
    const errInfo=(j.status==='erro'&&j.erro)?`<div style="font-size:11px;color:var(--red);font-family:var(--M);margin-top:4px">${JUMP.esc(j.erro).slice(0,120)}</div>`:'';
    return `<div class="ord-card" style="--ac:163,230,53">
      <div class="ord-ico">🎬</div>
      <div class="ord-body">
        <div class="ord-rota">Editor de Vídeo</div>
        <div class="ord-tarefa">${JUMP.esc(j.titulo||'Vídeo')}</div>
        <div class="ord-meta"><span class="ord-badge ${st.cls}" ${st.cor?`style="color:${st.cor}"`:''}>${st.txt}</span><span class="ord-tempo">criado ${tempoDecorrido(j.created_at)}</span></div>
        ${errInfo}
      </div>
      <div class="ord-acts">${baixar}${diag}</div>
    </div>`;
  }).join('');
}
async function baixarVid(jobId,salvoUrl,shotUrl){
  const url=salvoUrl||shotUrl;
  if(!url){JUMP.toast('Vídeo indisponível','err');return;}
  JUMP.toast('Baixando...');
  await JUMP.baixarArquivo(url,'video_jump_'+jobId+'.mp4');
  try{await JUMP.api('video_baixado',{job_id:jobId},CTX.token);}catch(e){}
}
async function diagVid(jobId){
  try{
    const d=await JUMP.api('video_diagnostico',{},CTX.token);
    alert(JSON.stringify(d.diagnostico||d,null,2));
  }catch(e){JUMP.toast('Erro no diagnóstico','err');}
}
async function cancelar(id){
  if(!confirm('Remover esta ordem?'))return;
  try{
    await JUMP.api('cancelar_ordem',{ordem_id:id},CTX.token);
    JUMP.toast('Ordem removida');
    TODAS=TODAS.filter(o=>o.id!==id);render();
  }catch(e){JUMP.toast('Erro ao remover','err');}
}
</script>
</body>
</html>
