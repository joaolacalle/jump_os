<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP OS — Calendário</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@700&family=Barlow:wght@400;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/jump-ui.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="grain"></div>
<div class="loading" id="loading"><div class="ld-spin"></div><div class="ld-t">Carregando calendário...</div></div>
<div class="app">
<main class="main">
  <div class="hd">
    <div><div class="hd-hello">Calendário</div><h1 class="hd-h">Plano de <em>postagens.</em></h1></div>
    <a href="agentes.html?agente=estratégia" class="btn btn-g btn-sm">+ Pedir conteúdo ao agente</a>
  </div>
  <div class="card">
    <div class="cal-head">
      <button class="btn btn-o btn-sm" onclick="mudaMes(-1)">←</button>
      <div class="cal-mes" id="cal-mes">—</div>
      <button class="btn btn-o btn-sm" onclick="mudaMes(1)">→</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div class="sec-lbl">Conteúdos do dia <span id="dia-sel" style="color:var(--g)"></span></div>
  <div id="dia-lista" class="card"><div style="font-family:var(--M);font-size:12px;color:var(--t3)">Clique em um dia do calendário para ver os conteúdos.</div></div>
</main>
</div>
<script src="assets/jump-core.js"></script>
<script>
let CTX=null,EVENTOS=[],ANO,MES;
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
(async()=>{
  try{
    JUMP.sidebar('calendario');
    CTX=await JUMP.guard();
    JUMP.setUser(CTX.cliente,CTX.user);
    const hoje=new Date();ANO=hoje.getFullYear();MES=hoje.getMonth();
    try{
      const{data}=await JUMP.sb.from('conteudos').select('*').eq('user_id',CTX.user.id);
      EVENTOS=data||[];
    }catch(e){}
    render();
    document.getElementById('loading').classList.add('hide');
  }catch(e){}
})();
function evDoDia(d){
  return EVENTOS.filter(ev=>{
    const dt=ev.data_postagem||ev.prazo||ev.created_at;
    if(!dt)return false;
    const e=new Date(dt);
    return e.getFullYear()===ANO&&e.getMonth()===MES&&e.getDate()===d;
  });
}
function render(){
  document.getElementById('cal-mes').textContent=MESES[MES]+' '+ANO;
  const prim=new Date(ANO,MES,1).getDay();
  const dias=new Date(ANO,MES+1,0).getDate();
  const hoje=new Date();
  let h=['D','S','T','Q','Q','S','S'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<prim;i++)h+='<div class="cal-day fora"></div>';
  for(let d=1;d<=dias;d++){
    const evs=evDoDia(d);
    const isHoje=hoje.getFullYear()===ANO&&hoje.getMonth()===MES&&hoje.getDate()===d;
    h+=`<div class="cal-day${isHoje?' hoje':''}${evs.length?' tem':''}" onclick="verDia(${d})">${d}${evs.slice(0,2).map(e=>`<span class="cal-ev${e.status==='pendente'?' pend':''}">${JUMP.esc(e.titulo||e.formato||'Post')}</span>`).join('')}${evs.length>2?'<span class="cal-ev">+'+(evs.length-2)+'</span>':''}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=h;
}
function verDia(d){
  document.getElementById('dia-sel').textContent=d+' de '+MESES[MES];
  const evs=evDoDia(d);
  const w=document.getElementById('dia-lista');
  if(!evs.length){w.innerHTML='<div style="font-family:var(--M);font-size:12px;color:var(--t3)">Nenhum conteúdo neste dia. Peça ao Agente de Estratégia para preencher seu calendário.</div>';return}
  w.innerHTML=evs.map(e=>`<div style="display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--bd)">
    <span style="font-size:17px">${(e.formato||'').includes('reel')?'🎬':(e.formato||'').includes('carros')?'🖼':'📝'}</span>
    <div style="flex:1"><strong style="font-size:14px">${JUMP.esc(e.titulo||'Conteúdo')}</strong><div style="font-family:var(--M);font-size:10px;color:var(--t3)">${JUMP.esc(e.formato||'post')} · ${JUMP.esc(e.status||'planejado')}</div></div>
    ${e.status==='pendente'?'<a href="aprovar.html" class="btn btn-g btn-sm">Aprovar →</a>':''}
  </div>`).join('');
}
function mudaMes(n){MES+=n;if(MES<0){MES=11;ANO--}if(MES>11){MES=0;ANO++}render()}
</script>
</body>
</html>
