<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUM OS — Calendário</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060607;--panel:#0F0F12;--panel2:#14141A;--border:#1E1E26;--border2:#2A2A35;
  --client-primary:#00E676;--client-accent:#00E676;--client-dim:rgba(0,230,118,.07);
  --red:#FF4545;--orange:#FF9F1C;--blue:#5C7CFA;--white:#FFF;--gray1:#9090A0;--gray2:#50505C;
  --font:'Inter',sans-serif;--mono:'Space Mono',monospace;
}
body{background:var(--bg);color:var(--white);font-family:var(--font);min-height:100vh;display:flex;flex-direction:column}
/* TOPBAR */
.topbar{height:56px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;position:sticky;top:0;z-index:200}
.brand{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:5px;text-transform:uppercase}
.brand span{color:var(--client-primary)}
.topbar-right{display:flex;align-items:center;gap:12px}
.plan-badge{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;background:var(--client-dim);color:var(--client-primary);border:1px solid rgba(0,230,118,.2);border-radius:20px;padding:4px 12px}
.user-chip{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--border2);border-radius:24px;padding:4px 12px 4px 4px}
.avatar{width:28px;height:28px;border-radius:50%;background:var(--client-primary);color:#000;font-size:10px;font-weight:900;display:flex;align-items:center;justify-content:center}
/* NAV */
.nav-tabs{display:flex;gap:2px;background:var(--panel2);border-radius:10px;padding:4px;margin-bottom:24px}
.nav-tab{flex:1;padding:9px;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;border:none;cursor:pointer;transition:.15s;background:transparent;color:var(--gray2);text-align:center;text-decoration:none;display:block}
.nav-tab.active{background:var(--panel);color:var(--white);border:1px solid var(--border2)}
.nav-tab:hover{color:var(--white)}
/* SIDEBAR */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:200px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:20px 0;flex-shrink:0}
.sidebar-section{padding:0 10px 16px}
.sidebar-label{font-size:8px;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:var(--gray2);padding:0 8px;margin-bottom:6px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--gray1);transition:.15s;margin-bottom:1px;text-decoration:none}
.nav-item:hover,.nav-item.active{background:var(--panel2);color:var(--white)}
.nav-item.active::before{content:'';position:absolute;left:-10px;top:50%;transform:translateY(-50%);width:2px;height:16px;background:var(--client-primary);border-radius:0 2px 2px 0}
.nav-item{position:relative}
.sidebar-divider{height:1px;background:var(--border);margin:2px 10px 16px}
/* MAIN */
.main{flex:1;overflow-y:auto;padding:28px 32px 60px}
.page-header{margin-bottom:24px;display:flex;align-items:center;justify-content:space-between}
.page-tag{font-size:9px;font-weight:800;letter-spacing:4px;color:var(--client-primary);text-transform:uppercase;margin-bottom:5px;font-family:var(--mono)}
.page-header h1{font-size:22px;font-weight:900;letter-spacing:-.5px;text-transform:uppercase}
.section-label{font-size:8px;font-weight:800;letter-spacing:4px;text-transform:uppercase;color:var(--gray2);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}
/* CALENDAR */
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-month{font-size:18px;font-weight:900;text-transform:uppercase;letter-spacing:-.3px}
.cal-nav{display:flex;gap:8px}
.cal-btn{background:var(--panel);border:1px solid var(--border2);color:var(--gray1);width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:.15s}
.cal-btn:hover{color:var(--white);border-color:var(--white)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.cal-day-header{background:var(--panel2);padding:10px;text-align:center;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gray2)}
.cal-day{background:var(--panel);padding:8px;min-height:90px;position:relative;transition:.15s;cursor:default}
.cal-day:hover{background:var(--panel2)}
.cal-day.other-month{opacity:.35}
.cal-day.today{background:rgba(0,230,118,.04)}
.cal-day.today::after{content:'';position:absolute;top:6px;right:6px;width:6px;height:6px;border-radius:50%;background:var(--client-primary)}
.cal-day-num{font-size:11px;font-weight:700;color:var(--gray2);margin-bottom:6px;font-family:var(--mono)}
.cal-day.today .cal-day-num{color:var(--client-primary)}
.cal-event{border-radius:4px;padding:3px 6px;font-size:9px;font-weight:700;margin-bottom:3px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:.15s}
.cal-event:hover{opacity:.85;transform:translateX(1px)}
.ev-feed{background:rgba(0,230,118,.15);color:var(--client-primary);border-left:2px solid var(--client-primary)}
.ev-reel{background:rgba(92,124,250,.15);color:var(--blue);border-left:2px solid var(--blue)}
.ev-carrossel{background:rgba(255,159,28,.15);color:var(--orange);border-left:2px solid var(--orange)}
.ev-publicado{background:rgba(80,80,100,.15);color:var(--gray1);border-left:2px solid var(--gray2)}
/* LEGEND */
.legend{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--gray1)}
.legend-dot{width:8px;height:8px;border-radius:2px}
/* SIDEBAR LIST */
.upcoming-list{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:16px;margin-top:0}
.upcoming-item{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.upcoming-item:last-child{border-bottom:none}
.upcoming-date{font-size:10px;font-weight:800;font-family:var(--mono);color:var(--client-primary);width:36px;text-align:center;padding-top:2px}
.upcoming-info{flex:1}
.upcoming-title{font-size:12px;font-weight:700;margin-bottom:3px}
.upcoming-type{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase}
.upcoming-time{font-size:10px;color:var(--gray2);font-family:var(--mono);margin-top:2px}
.status-dot{width:6px;height:6px;border-radius:50%;margin-top:5px;flex-shrink:0}
.dot-pending{background:var(--orange)}
.dot-approved{background:var(--client-primary)}
.dot-posted{background:var(--gray2)}
/* BTN */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:8px;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;border:none;cursor:pointer;transition:.15s;text-decoration:none}
.btn-primary{background:var(--client-primary);color:#000}
.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--gray1)}
.btn-outline:hover{border-color:var(--white);color:var(--white)}
/* TOAST */
.toast-container{position:fixed;bottom:20px;right:20px;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--panel);border:1px solid var(--border2);border-radius:9px;padding:11px 16px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:8px;transform:translateX(110%);transition:.3s cubic-bezier(.34,1.56,.64,1);min-width:220px}
.toast.show{transform:translateX(0)}
.toast.success{border-left:2px solid var(--client-primary)}
.toast.info{border-left:2px solid var(--blue)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}
</style>
</head>
<body>
<header class="topbar">
  <div class="brand">JUM <span>OS</span></div>
  <div class="topbar-right">
    <div class="plan-badge">Plano Plus</div>
    <div class="user-chip">
      <div class="avatar">JV</div>
      <span style="font-size:12px;font-weight:600">João Vittor</span>
    </div>
  </div>
</header>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-section">
      <div class="sidebar-label">Principal</div>
      <a href="dashboard-usuario.html" class="nav-item">▦ Dashboard</a>
      <a href="calendario.html" class="nav-item active">◫ Calendário</a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Conteúdo</div>
      <a href="aprovar.html" class="nav-item">✦ Aprovar<span style="margin-left:auto;background:var(--red);color:#fff;font-size:8px;font-weight:900;border-radius:10px;padding:2px 6px">3</span></a>
      <a href="historico.html" class="nav-item">◈ Histórico</a>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section">
      <div class="sidebar-label">Conta</div>
      <a href="dashboard-usuario.html" class="nav-item">↑ Mudar plano</a>
      <a href="login.html" class="nav-item" style="color:var(--gray2)">← Sair</a>
    </div>
  </nav>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-tag">↳ Calendário de conteúdo</div>
        <h1 id="cal-title">Junho 2026</h1>
      </div>
      <div style="display:flex;gap:8px">
        <a href="aprovar.html" class="btn btn-outline">Ver pendentes (3)</a>
        <a href="#" class="btn btn-primary" onclick="showToast('Conteúdo sendo gerado para o próximo mês...','info');return false">+ Gerar próximo mês</a>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 280px;gap:20px">
      <div>
        <div class="cal-header">
          <div class="cal-month" id="month-label">Junho 2026</div>
          <div class="cal-nav">
            <button class="cal-btn" onclick="changeMonth(-1)">‹</button>
            <button class="cal-btn" onclick="changeMonth(1)">›</button>
          </div>
        </div>
        <div class="cal-grid" id="cal-grid">
          <div class="cal-day-header">Dom</div>
          <div class="cal-day-header">Seg</div>
          <div class="cal-day-header">Ter</div>
          <div class="cal-day-header">Qua</div>
          <div class="cal-day-header">Qui</div>
          <div class="cal-day-header">Sex</div>
          <div class="cal-day-header">Sáb</div>
        </div>
        <div class="legend">
          <div class="legend-item"><div class="legend-dot" style="background:rgba(0,230,118,.5)"></div>Feed</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(92,124,250,.5)"></div>Reel</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(255,159,28,.5)"></div>Carrossel</div>
          <div class="legend-item"><div class="legend-dot" style="background:rgba(80,80,100,.5)"></div>Publicado</div>
        </div>
      </div>

      <div>
        <div class="section-label">Próximas publicações</div>
        <div class="upcoming-list" id="upcoming-list"></div>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];

let currentDate = new Date(); currentDate.setDate(1); // Mês atual

const POSTS = [
  { day: 3, type: 'feed', title: 'Fechei 3 negócios', time: '19h07', status: 'pending' },
  { day: 10, type: 'reel', title: 'O problema que nenhum consultor resolve', time: '19h13', status: 'pending' },
  { day: 17, type: 'carrossel', title: '5 erros no tráfego pago', time: '12h22', status: 'approved' },
  { day: 24, type: 'reel', title: 'A reunião de marketing (humor)', time: '19h08', status: 'pending' },
  { day: 25, type: 'carrossel', title: 'Script de posicionamento', time: '12h15', status: 'pending' },
  { day: 27, type: 'reel', title: 'Seu Instagram não tem problema', time: '12h30', status: 'pending' },
  { day: 28, type: 'feed', title: '3 dias. Do Instagram ao cliente.', time: '19h22', status: 'pending' },
  { day: 30, type: 'reel', title: 'VSL — Anúncio Meta Ads', time: '19h17', status: 'pending' },
];

const TYPE_CLASS = { feed: 'ev-feed', reel: 'ev-reel', carrossel: 'ev-carrossel' };
const TYPE_LABEL = { feed: 'Feed', reel: 'Reel', carrossel: 'Carrossel' };

function renderCalendar() {
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();
  document.getElementById('month-label').textContent = `${MONTHS[month]} ${year}`;
  document.getElementById('cal-title').textContent = `${MONTHS[month]} ${year}`;

  const grid = document.getElementById('cal-grid');
  // Clear days only
  const headers = grid.querySelectorAll('.cal-day-header');
  grid.innerHTML = '';
  headers.forEach(h => grid.appendChild(h.cloneNode(true)));

  const first = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const daysInPrev = new Date(year, month, 0).getDate();
  const today = new Date();

  // Prev month days
  for (let i = first - 1; i >= 0; i--) {
    const d = document.createElement('div');
    d.className = 'cal-day other-month';
    d.innerHTML = `<div class="cal-day-num">${daysInPrev - i}</div>`;
    grid.appendChild(d);
  }

  // Current month
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const isToday = today.getDate() === d && today.getMonth() === month && today.getFullYear() === year;
    cell.className = 'cal-day' + (isToday ? ' today' : '');
    cell.innerHTML = `<div class="cal-day-num">${d}</div>`;
    
    const posts = POSTS.filter(p => p.day === d);
    posts.forEach(p => {
      const ev = document.createElement('div');
      ev.className = `cal-event ${TYPE_CLASS[p.type] || ''}`;
      if (p.status === 'posted') ev.className = 'cal-event ev-publicado';
      ev.textContent = `${p.time} ${p.title}`;
      ev.title = p.title;
      ev.onclick = () => showToast(`${TYPE_LABEL[p.type]} — ${p.title} — ${p.time}`, 'info');
      cell.appendChild(ev);
    });
    grid.appendChild(cell);
  }

  // Next month
  const total = first + daysInMonth;
  const rem = total % 7 === 0 ? 0 : 7 - (total % 7);
  for (let d = 1; d <= rem; d++) {
    const cell = document.createElement('div');
    cell.className = 'cal-day other-month';
    cell.innerHTML = `<div class="cal-day-num">${d}</div>`;
    grid.appendChild(cell);
  }

  // Upcoming list
  const now = today.getDate();
  const upcoming = POSTS.filter(p => p.day >= now || currentDate.getMonth() !== today.getMonth())
    .slice(0, 6);
  const list = document.getElementById('upcoming-list');
  list.innerHTML = upcoming.map(p => `
    <div class="upcoming-item">
      <div class="upcoming-date">${String(p.day).padStart(2,'0')}/${String(currentDate.getMonth()+1).padStart(2,'0')}</div>
      <div class="upcoming-info">
        <div class="upcoming-title">${p.title}</div>
        <div class="upcoming-type" style="color:${p.type==='reel'?'var(--blue)':p.type==='carrossel'?'var(--orange)':'var(--client-primary)'}">${TYPE_LABEL[p.type]}</div>
        <div class="upcoming-time">${p.time}</div>
      </div>
      <div class="status-dot ${p.status==='posted'?'dot-posted':p.status==='approved'?'dot-approved':'dot-pending'}"></div>
    </div>`).join('');
}

function changeMonth(dir) {
  currentDate.setMonth(currentDate.getMonth() + dir);
  renderCalendar();
}

renderCalendar();

function showToast(msg, type='info') {
  const c = document.getElementById('toastContainer');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  const colors = { success: 'var(--client-primary)', info: 'var(--blue)', warning: 'var(--orange)' };
  const icons = { success: '✓', info: 'ℹ', warning: '⚠' };
  t.innerHTML = `<span style="color:${colors[type]};font-weight:900">${icons[type]}</span> ${msg}`;
  c.appendChild(t);
  requestAnimationFrame(() => requestAnimationFrame(() => t.classList.add('show')));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 400); }, 3500);
}
</script>
</body>
</html>
