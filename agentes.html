<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP OS — Meus agentes</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/jump-ui.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
.chat-layout{display:grid;grid-template-columns:250px 1fr;gap:14px;height:calc(100vh - 170px);min-height:480px}
.ag-list{display:flex;flex-direction:column;gap:7px;overflow:auto;padding-right:3px}
.ag-it{display:flex;align-items:center;gap:10px;padding:11px 12px;border-radius:11px;background:var(--card);border:1px solid var(--bd);cursor:pointer;transition:.2s}
.ag-it:hover{border-color:rgba(var(--g-rgb),.35)}
.ag-it.on{border-color:var(--g);background:rgba(var(--g-rgb),.07)}
.ag-it.locked{opacity:.42;cursor:default}
.ag-it-ico{font-size:17px}
.ag-it-n{font-size:13px;font-weight:800;color:var(--t1);line-height:1.15}
.ag-it-r{font-family:var(--M);font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.ag-lock{margin-left:auto;font-size:10px;font-family:var(--M);color:var(--t3)}
/* CHAT */
.chat-card{background:var(--card);border:1px solid var(--bd);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
.chat-top{display:flex;align-items:center;gap:11px;padding:13px 16px;border-bottom:1px solid var(--bd)}
.ct-ico{width:36px;height:36px;border-radius:10px;background:rgba(var(--g-rgb),.12);border:1px solid rgba(var(--g-rgb),.3);display:flex;align-items:center;justify-content:center;font-size:17px}
.ct-n{font-family:var(--D);font-size:17px;letter-spacing:.5px;text-transform:uppercase;color:var(--g);line-height:1}
.ct-s{font-family:var(--M);font-size:9.5px;color:var(--t3);letter-spacing:1px;text-transform:uppercase;margin-top:2px;display:flex;align-items:center;gap:5px}
.mem-btn{margin-left:auto;font-family:var(--M);font-size:10px;font-weight:700;letter-spacing:1px;padding:7px 12px;border-radius:18px;border:1px solid rgba(var(--g-rgb),.3);color:var(--g);cursor:pointer;transition:.2s}
.mem-btn:hover{background:rgba(var(--g-rgb),.1)}
.chat-msgs{flex:1;overflow:auto;padding:16px;display:flex;flex-direction:column;gap:11px}
.msg{max-width:78%;padding:11px 14px;border-radius:13px;font-size:14px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word}
.msg.u{align-self:flex-end;background:rgba(var(--g-rgb),.14);border:1px solid rgba(var(--g-rgb),.25);color:var(--t1);border-bottom-right-radius:4px}
.msg.a{align-self:flex-start;background:rgba(0,0,0,.22);border:1px solid var(--bd);color:var(--t1);border-bottom-left-radius:4px}
[data-theme="light"] .msg.a{background:rgba(0,0,0,.05)}
.msg-meta{font-family:var(--M);font-size:8.5px;color:var(--t3);margin-top:6px;letter-spacing:1px;text-transform:uppercase}
.typing{align-self:flex-start;display:flex;gap:5px;padding:13px 16px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--g);animation:ty 1.2s infinite}
.typing span:nth-child(2){animation-delay:.18s}.typing span:nth-child(3){animation-delay:.36s}
@keyframes ty{0%,60%,100%{opacity:.25;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.chat-in{display:flex;gap:9px;padding:13px;border-top:1px solid var(--bd)}
.chat-in textarea{flex:1;resize:none;padding:12px 14px;border-radius:11px;background:rgba(0,0,0,.3);border:1.5px solid var(--bd);font-size:14px;line-height:1.5;max-height:120px}
[data-theme="light"] .chat-in textarea{background:rgba(0,0,0,.04)}
.chat-in textarea:focus{border-color:rgba(var(--g-rgb),.5)}
.send-btn{align-self:flex-end;width:46px;height:46px;border-radius:11px;background:var(--g);color:#000;font-size:17px;font-weight:900;transition:.2s;flex-shrink:0}
.send-btn:hover{transform:translateY(-1px);box-shadow:0 8px 22px var(--glow)}
.send-btn:disabled{opacity:.45;transform:none}
.empty-chat{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:9px;padding:24px;text-align:center}
.ec-ico{font-size:38px}
.ec-t{font-family:var(--D);font-size:21px;letter-spacing:1px;text-transform:uppercase;color:var(--t1)}
.ec-b{font-size:13px;color:var(--t3);max-width:380px;line-height:1.6}
.sug-chips{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:6px}
.chip{font-size:12px;font-weight:700;padding:8px 13px;border-radius:18px;border:1px solid rgba(var(--g-rgb),.3);color:var(--g);cursor:pointer;transition:.2s}
.chip:hover{background:rgba(var(--g-rgb),.1)}
/* Painel memórias */
.mem-pane{display:none;border-bottom:1px solid var(--bd);padding:13px 16px;background:rgba(var(--g-rgb),.04);max-height:190px;overflow:auto}
.mem-pane.show{display:block}
.mem-it{font-size:12px;color:var(--t2);padding:5px 0;border-bottom:1px solid var(--bd);display:flex;gap:8px}
.mem-it:last-child{border:none}
.mem-k{font-family:var(--M);font-size:10px;color:var(--g);text-transform:uppercase;letter-spacing:.5px;flex-shrink:0;margin-top:1px}
@media(max-width:920px){
  .chat-layout{grid-template-columns:1fr;height:auto}
  .ag-list{flex-direction:row;overflow-x:auto;padding-bottom:6px}
  .ag-it{min-width:150px;flex-shrink:0}
  .chat-card{height:calc(100vh - 290px);min-height:420px}
}
</style>
</head>
<body>
<div class="grain"></div>
<div class="loading" id="loading"><div class="ld-spin"></div><div class="ld-t">Acordando os agentes...</div></div>
<div class="app">
<main class="main">
  <div class="hd" style="margin-bottom:16px">
    <div><div class="hd-hello">Meus agentes</div><h1 class="hd-h">Converse com o <em>sistema.</em></h1></div>
    <div style="min-width:170px">
      <div class="bar"><div class="bar-f" id="tok-bar" style="width:0%"></div></div>
      <div class="bar-l" id="tok-txt">uso do mês</div>
    </div>
  </div>
  <div class="chat-layout">
    <div class="ag-list" id="ag-list"></div>
    <div class="chat-card">
      <div class="chat-top">
        <div class="ct-ico" id="ct-ico">🤖</div>
        <div><div class="ct-n" id="ct-n">Escolha um agente</div><div class="ct-s" id="ct-s"><span class="dot" style="width:6px;height:6px"></span> online</div></div>
        <button class="mem-btn" id="mem-btn" onclick="toggleMem()" style="display:none">🧠 O que aprendi</button>
      </div>
      <div class="mem-pane" id="mem-pane"></div>
      <div class="chat-msgs" id="msgs">
        <div class="empty-chat" id="empty">
          <div class="ec-ico">👈</div>
          <div class="ec-t">Escolha um agente</div>
          <div class="ec-b">Cada agente é especialista em uma etapa do seu marketing — e aprende sobre o seu negócio a cada conversa.</div>
        </div>
      </div>
      <div class="chat-in">
        <textarea id="inp" rows="1" placeholder="Escreva sua mensagem..." disabled></textarea>
        <button class="send-btn" id="send" onclick="enviar()" disabled>➤</button>
      </div>
    </div>
  </div>
</main>
</div>
<script src="assets/jump-core.js"></script>
<script>
let CTX=null,AG=null,BUSY=false;
const LV={basico:1,plus:2,pro:3};
const AGS=[
  {id:'identidade',ico:'🎨',n:'Identidade',r:'DNA da marca',min:1,sug:['Quero fazer meu check-in','Refinar meu posicionamento','Qual tom de voz combina comigo?']},
  {id:'mercado',ico:'🔍',n:'Mercado',r:'Inteligência do nicho',min:1,sug:['Analise meu concorrente @perfil','Quais lacunas existem no meu nicho?','Benchmarks do meu segmento']},
  {id:'diagnostico',ico:'📊',n:'Diagnóstico',r:'Análise do perfil',min:1,sug:['O que observar no meu Instagram?','Meus Reels não performam, por quê?','Melhores horários para postar']},
  {id:'estrategia',ico:'📋',n:'Estratégia',r:'Planos e roteiros',min:1,sug:['Roteiro de Reel para esta semana','Calendário de conteúdo do mês','5 ideias de post para meu nicho']},
  {id:'criativo',ico:'🖼',n:'Criativo',r:'Direção visual',min:1,sug:['Carrossel sobre meu produto principal','Capa de Reel que gera clique','Arte de feed para promoção']},
  {id:'publicacao',ico:'📅',n:'Publicação',r:'Agendamento',min:2,sug:['Qual frequência ideal de posts?','Como funciona a fila de aprovação?']},
  {id:'trafego',ico:'📢',n:'Tráfego',r:'Meta Ads',min:3,sug:['Estruturar campanha com R$600/mês','Meu CPL está alto, o que ajustar?']},
  {id:'video',ico:'🎬',n:'Editor de Vídeo',r:'Edição de Reels',min:3,sug:['Como cortar meu vídeo de 3min em Reel?','Estilo de legenda para meu nicho']},
];
(async()=>{
  try{
    JUMP.sidebar('agentes');
    CTX=await JUMP.guard();
    JUMP.setUser(CTX.cliente,CTX.user);
    renderList();
    atualizarUso(Number((CTX.cliente.uso||{}).tokens||0));
    const q=new URLSearchParams(location.search).get('agente');
    if(q){const m=AGS.find(a=>q.toLowerCase().includes(a.id)||a.n.toLowerCase()===q.toLowerCase());if(m)selecionar(m.id)}
    document.getElementById('loading').classList.add('hide');
  }catch(e){}
})();
function nivel(){return LV[CTX.cliente.plano]||1}
function renderList(){
  document.getElementById('ag-list').innerHTML=AGS.map(a=>{
    const ok=a.min<=nivel();
    return `<div class="ag-it${ok?'':' locked'}${AG===a.id?' on':''}" ${ok?`onclick="selecionar('${a.id}')"`:''}>
      <span class="ag-it-ico">${a.ico}</span>
      <div><div class="ag-it-n">${a.n}</div><div class="ag-it-r">${a.r}</div></div>
      ${ok?'':'<span class="ag-lock">🔒 '+(a.min===2?'Plus':'Pro')+'</span>'}
    </div>`;
  }).join('');
}
async function selecionar(id){
  AG=id;renderList();
  const a=AGS.find(x=>x.id===id);
  document.getElementById('ct-ico').textContent=a.ico;
  document.getElementById('ct-n').textContent='Agente de '+a.n;
  document.getElementById('mem-btn').style.display='inline-block';
  document.getElementById('mem-pane').classList.remove('show');
  document.getElementById('inp').disabled=false;
  document.getElementById('send').disabled=false;
  const w=document.getElementById('msgs');
  w.innerHTML='';
  /* histórico */
  try{
    const{data}=await JUMP.sb.from('chat_mensagens').select('role,conteudo,created_at').eq('user_id',CTX.user.id).eq('agente',id).order('created_at',{ascending:true}).limit(60);
    if(data&&data.length){
      data.forEach(m=>addMsg(m.role==='user'?'u':'a',m.conteudo));
    }else{
      w.innerHTML=`<div class="empty-chat">
        <div class="ec-ico">${a.ico}</div>
        <div class="ec-t">Agente de ${a.n}</div>
        <div class="ec-b">${id==='identidade'?'Comece pelo check-in: eu conheço seu negócio uma vez e todos os agentes aprendem junto.':'Pronto para trabalhar no seu nicho. O que precisa?'}</div>
        <div class="sug-chips">${a.sug.map(s=>`<span class="chip" onclick="usarChip(this)">${s}</span>`).join('')}</div>
      </div>`;
    }
  }catch(e){}
  w.scrollTop=w.scrollHeight;
  document.getElementById('inp').focus();
  if(id==='criativo')verificarOrdens();
}
function usarChip(el){document.getElementById('inp').value=el.textContent;enviar()}

async function verificarOrdens(){
  try{
    const{data}=await JUMP.sb.from('ordens_servico').select('*').eq('user_id',CTX.user.id).eq('para_agente','criativo').eq('status','pendente').order('created_at',{ascending:true});
    if(!data||!data.length)return;
    const w=document.getElementById('msgs');
    const ec=w.querySelector('.empty-chat');if(ec)ec.remove();
    const box=document.createElement('div');box.className='msg a ordens-box';
    box.innerHTML='📨 <b>Você tem '+data.length+' ordem(ns) pendente(s)</b><div style="font-size:12.5px;color:var(--t2);margin:6px 0">'+data.map(o=>'• '+(o.detalhe||o.tarefa)).join('<br>')+'</div><button class="btn btn-g btn-sm" onclick="executarOrdens()">⚡ Executar ordens (gera ficha técnica + logo)</button>';
    w.appendChild(box);w.scrollTop=w.scrollHeight;
  }catch(e){}
}

async function executarOrdens(btn){
  const box=document.querySelector('.ordens-box');
  const b=box?box.querySelector('button'):null;
  if(b){b.disabled=true;b.innerHTML='<span class="spin-i"></span> Gerando ficha técnica + logo...'}
  try{
    // Monta o prompt da ficha técnica + logo a partir do OS_DATA (memórias)
    const{data:mems}=await JUMP.sb.from('memorias').select('chave,valor').eq('user_id',CTX.user.id);
    const M={};(mems||[]).forEach(m=>M[m.chave]=m.valor);
    const marca=M.marca||CTX.cliente.nome||'Marca';
    const paleta=(M.paleta_primaria||'#00E676')+', '+(M.paleta_secundaria||'')+', cta '+(M.cor_cta||'');
    const fontes=(M.tipografia_primaria||'')+' / '+(M.tipografia_secundaria||'');
    const estilo=M.estilo_visual||'EDITORIAL';

    // 1) Ficha técnica visual (brand board)
    const promptFicha='Professional brand identity guide board (brand style sheet) for "'+marca+'". Show: color palette swatches with hex codes ('+paleta+'), typography samples ('+fontes+'), and one example Instagram post mockup. Style: '+estilo+', premium, clean editorial layout, dark background, organized grid. High quality, realistic design presentation. Text must be sharp and correct.';
    await gerarPorOrdem(promptFicha,'1:1','conceitual','Ficha técnica visual');

    // 2) Sugestão de logo (adaptada ao nicho/arquétipo do OS_DATA)
    const nicho=M.nicho||'';const arquetipo=M.arquetipo||'';const dna=M.dna_visual||'';
    const promptLogo='Design ONE professional brand logo for "'+marca+'". '
      +'Niche: '+nicho+'. Brand archetype: '+arquetipo+'. Visual DNA: '+dna+'. '
      +'Style: '+estilo+'. Colors: '+paleta+'. '
      +'Create a complete logo lockup: a distinctive ICON/symbol that represents the niche (memorable, geometric or organic as fits the archetype) combined with a clean wordmark of the brand name. '
      +'Show the logo centered on a neutral premium background, plus a small variation (icon alone) in a corner. '
      +'Professional vector-style branding, sharp edges, high contrast, balanced spacing, agency-level quality. '
      +'The brand name text must be spelled EXACTLY "'+marca+'", perfectly legible, no distortion. Avoid generic clipart, avoid stock symbols.';
    await gerarPorOrdem(promptLogo,'1:1','conceitual','Sugestão de logo');

    // marca ordens como concluídas
    await JUMP.sb.from('ordens_servico').update({status:'concluida'}).eq('user_id',CTX.user.id).eq('para_agente','criativo').eq('status','pendente');
    if(box)box.remove();
    JUMP.toast('✓ Ficha técnica e logo geradas!');
    // RETORNO (Rota 1): pergunta sobre aplicar a dashboard + orienta próximo
    mostrarRetornoFicha();
  }catch(e){
    if(b){b.disabled=false;b.innerHTML='⚡ Executar ordens (gera ficha técnica + logo)'}
    JUMP.toast(e.message||'Erro ao executar ordens','err');
  }
}

function mostrarRetornoFicha(){
  const w=document.getElementById('msgs');
  const box=document.createElement('div');box.className='msg a retorno-ficha';
  box.innerHTML='✅ <b>Ficha técnica concluída.</b><div style="font-size:12.5px;color:var(--t2);margin:6px 0">Quer aplicar estas cores da sua marca na sua dashboard (botões, gráficos, menu)? Você pode manter o visual atual se preferir.</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-g btn-sm" onclick="aplicarTemaOSData(this)">Aplicar na minha dashboard</button><button class="btn btn-o btn-sm" onclick="manterTema(this)">Manter atual</button></div>';
  w.appendChild(box);w.scrollTop=w.scrollHeight;
}
async function aplicarTemaOSData(btn){
  try{
    const{data:mems}=await JUMP.sb.from('memorias').select('chave,valor').eq('user_id',CTX.user.id);
    const M={};(mems||[]).forEach(m=>M[m.chave]=m.valor);
    const p1=(M.paleta_primaria||'').split(',').map(s=>s.trim()).filter(Boolean);
    const p2=(M.paleta_secundaria||'').split(',').map(s=>s.trim()).filter(Boolean);
    const tema={
      c1:p1[0]||'#00E676',
      c2:p2[0]||p1[1]||'#00D4FF',
      c3:(M.cor_cta||p1[2]||'#A855F7'),
      c4:p1[0]?undefined:'#141312',
      bg:'escuro'
    };
    JUMP.applyTheme(tema);
    await JUMP.sb.from('clientes').update({tema}).eq('id',CTX.user.id);
    JUMP.toast('🎨 Dashboard personalizada com sua marca!');
  }catch(e){JUMP.toast('Não consegui aplicar agora','err')}
  finalizarRota1(btn);
}
function manterTema(btn){JUMP.toast('Visual atual mantido.');finalizarRota1(btn);}
async function finalizarRota1(btn){
  const box=document.querySelector('.retorno-ficha');if(box)box.remove();
  try{const ob=Object.assign({},CTX.cliente.onboarding||{},{identidade:true});await JUMP.sb.from('clientes').update({onboarding:ob}).eq('id',CTX.user.id);CTX.cliente.onboarding=ob;}catch(e){}
  const w=document.getElementById('msgs');
  const m=document.createElement('div');m.className='msg a';
  m.innerHTML='🎯 <b>Identidade concluída!</b> Próximo passo: vá ao <b>Agente de Mercado</b> para analisarmos seus concorrentes e oportunidades do nicho.';
  w.appendChild(m);w.scrollTop=w.scrollHeight;
}
async function gerarPorOrdem(prompt,tamanho,tipo,titulo){
  const w=document.getElementById('msgs');
  const lbl=document.createElement('div');lbl.className='msg a';
  lbl.innerHTML='🎨 <b>'+titulo+'</b> — gerando...';
  w.appendChild(lbl);w.scrollTop=w.scrollHeight;
  const r=await fetch('/api/gerar-imagem',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+CTX.token},
    body:JSON.stringify({prompt,tamanho,tipo})
  });
  const raw=await r.text();let d;try{d=JSON.parse(raw)}catch(_){throw new Error('Falha ao gerar '+titulo)}
  if(!r.ok)throw new Error((d.error||'Erro')+(d.detalhe?(' — '+d.detalhe):''));
  lbl.innerHTML='🎨 <b>'+titulo+'</b><br><img src="'+d.url+'" style="width:100%;border-radius:10px;margin-top:6px"><button class="btn btn-o btn-sm" style="margin-top:6px" onclick="baixarImg(\''+d.url+'\',this)">⬇ Baixar</button>';
  w.scrollTop=w.scrollHeight;
}
function addMsg(cls,txt,meta){
  const w=document.getElementById('msgs');
  const e=document.getElementById('empty');if(e)e.remove();
  const d=document.createElement('div');
  d.className='msg '+cls;
  d.textContent=txt;
  if(meta){const m=document.createElement('div');m.className='msg-meta';m.textContent=meta;d.appendChild(m)}
  w.appendChild(d);w.scrollTop=w.scrollHeight;
  return d;
}
async function enviar(){
  if(BUSY||!AG)return;
  const inp=document.getElementById('inp');
  const txt=inp.value.trim();
  if(!txt)return;
  BUSY=true;inp.value='';inp.style.height='auto';
  document.getElementById('send').disabled=true;
  addMsg('u',txt);
  const w=document.getElementById('msgs');
  const ty=document.createElement('div');ty.className='typing';ty.innerHTML='<span></span><span></span><span></span>';
  w.appendChild(ty);w.scrollTop=w.scrollHeight;
  try{
    const r=await fetch('/api/agente-chat',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CTX.token},
      body:JSON.stringify({agente:AG,mensagem:txt})
    });
    const raw=await r.text();
    let d;
    try{d=JSON.parse(raw)}catch(_){
      throw new Error('A resposta demorou mais que o normal e foi interrompida. Envie novamente — geralmente funciona na segunda tentativa.');
    }
    ty.remove();
    if(!r.ok){
      if(d&&d.limite){limiteMsg()}
      else addMsg('a','⚠️ '+(d.error||'Erro no agente'));
    }else{
      addMsg('a',d.resposta,d.memorias_novas?('🧠 aprendi '+d.memorias_novas+' coisa'+(d.memorias_novas>1?'s':'')+' nova'+(d.memorias_novas>1?'s':'')):null);
      if(d.checkin)JUMP.toast('🎉 Check-in concluído! Todos os agentes já conhecem seu negócio.');
      if(d.tokens!==undefined)atualizarUso(d.tokens);
      if(d.gerar_imagem)mostrarBotaoImagem(d.gerar_imagem);
      if(d.aplicar_tema){try{JUMP.applyTheme(Object.assign({bg:'escuro'},d.aplicar_tema));JUMP.toast('🎨 Dashboard personalizada com as cores da sua marca!')}catch(e){}}
      // botões de escolha quando o Identidade oferece manter/sugerir
      if(AG==='identidade' && /manter identidade|sugerir nova|dois caminhos|preservar.*marca|evoluir/i.test(d.resposta||'') && !document.querySelector('.id-choice')){
        const w=document.getElementById('msgs');const box=document.createElement('div');box.className='msg a id-choice';
        box.innerHTML='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:4px"><button class="btn btn-g btn-sm" onclick="escolhaId(\'Quero MANTER minha identidade atual. Use as cores e fontes reais da minha logo.\',this)">✓ Manter minha identidade</button><button class="btn btn-o btn-sm" onclick="escolhaId(\'Quero que você SUGIRA uma nova identidade visual otimizada.\',this)">✨ Sugerir nova</button></div>';
        w.appendChild(box);w.scrollTop=w.scrollHeight;
      }
      if(d.ordens)JUMP.toast('📨 Ordem enviada ao Agente Designer');
    }
  }catch(e){
    ty.remove();
    addMsg('a','⚠️ '+e.message);
  }
  BUSY=false;document.getElementById('send').disabled=false;inp.focus();
}
async function mostrarBotaoImagem(req){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg a';
  d.innerHTML='🎨 <b>Conceito pronto para gerar.</b><div style="font-size:11px;color:var(--t3);margin:6px 0;font-family:var(--M)">A imagem será criada a partir do conceito.</div><button class="btn btn-g btn-sm" style="margin-top:6px">✨ Gerar imagem</button>';
  const btn=d.querySelector('button');
  btn.onclick=()=>gerarImagem(req,btn);
  w.appendChild(d);w.scrollTop=w.scrollHeight;
}
async function gerarImagem(req,btn){
  btn.disabled=true;btn.innerHTML='<span class="spin-i"></span> Gerando (pode levar até 30s)...';
  try{
    const r=await fetch('/api/gerar-imagem',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+CTX.token},
      body:JSON.stringify({prompt:req.prompt,tamanho:req.tamanho||'4:5',tipo:req.tipo||'conceitual'})
    });
    const raw=await r.text();let d;
    try{d=JSON.parse(raw)}catch(_){throw new Error('A geração demorou demais. Tente novamente.')}
    if(!r.ok){if(d&&d.limite){btn.parentElement.innerHTML='🚦 Limite mensal de imagens atingido. Fale com seu gestor.';return}throw new Error((d.error||'Erro ao gerar')+(d.detalhe?(' — '+d.detalhe):''))}
    const w=document.getElementById('msgs');
    const img=document.createElement('div');img.className='msg a';
    img.innerHTML='<img src="'+d.url+'" style="width:100%;border-radius:10px;display:block" alt="criativo gerado"><div style="font-family:var(--M);font-size:9px;color:var(--t3);margin-top:6px">imagem '+d.usadas+(d.limite?'/'+d.limite:'')+' do mês · salva em Meus arquivos</div><button class="btn btn-o btn-sm" style="margin-top:7px" onclick="baixarImg(\''+d.url+'\',this)">⬇ Baixar</button>';
    w.appendChild(img);w.scrollTop=w.scrollHeight;
    btn.parentElement.remove();
    JUMP.toast('✓ Imagem gerada e salva!');
  }catch(e){
    btn.disabled=false;btn.innerHTML='✨ Gerar imagem';
    JUMP.toast(e.message,'err');
  }
}
function escolhaId(txt,btn){
  document.querySelectorAll('.id-choice').forEach(e=>e.remove());
  document.getElementById('inp').value=txt;enviar();
}
async function baixarImg(url,btn){
  if(btn){btn.disabled=true;btn.innerHTML='<span class=\"spin-i\"></span> Baixando...'}
  try{
    const r=await fetch(url);const blob=await r.blob();
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='jump-os-'+Date.now()+'.png';document.body.appendChild(a);a.click();
    a.remove();URL.revokeObjectURL(a.href);
    if(btn){btn.disabled=false;btn.innerHTML='✓ Baixado'}
  }catch(e){if(btn){btn.disabled=false;btn.innerHTML='⬇ Baixar'}JUMP.toast('Erro ao baixar','err')}
}
function limiteMsg(){
  const w=document.getElementById('msgs');
  const d=document.createElement('div');d.className='msg a';
  d.innerHTML='🚦 <b>Seu limite mensal de uso foi atingido.</b><br>Solicite um aumento ao seu gestor — ele recebe o pedido na hora, direto no painel dele.<br><button class="btn btn-g btn-sm" style="margin-top:9px" onclick="solicitarTokens(this)">Solicitar aumento →</button>';
  w.appendChild(d);w.scrollTop=w.scrollHeight;
}
async function solicitarTokens(btn){
  btn.disabled=true;btn.textContent='Enviando...';
  try{
    await JUMP.api('request_tokens',{},CTX.token);
    btn.textContent='✓ Solicitação enviada';
    JUMP.toast('Seu gestor foi avisado e pode liberar mais uso.');
  }catch(e){btn.disabled=false;btn.textContent='Solicitar aumento →';JUMP.toast(e.message,'err')}
}
function atualizarUso(tk){
  const lim=Number((CTX.cliente.limites||{}).tokens||1000000);
  const pct=Math.min(100,Math.round((tk/lim)*100));
  const bar=document.getElementById('tok-bar');
  bar.style.width=pct+'%';
  bar.className='bar-f'+(pct>=95?' full':pct>=75?' warn':'');
  document.getElementById('tok-txt').textContent=JUMP.fmtNum(tk)+' / '+JUMP.fmtNum(lim)+' tokens no mês';
}
async function toggleMem(){
  const p=document.getElementById('mem-pane');
  if(p.classList.contains('show')){p.classList.remove('show');return}
  try{
    const{data}=await JUMP.sb.from('memorias').select('chave,valor,agente').eq('user_id',CTX.user.id).or(`agente.eq.${AG},agente.eq.global`).order('updated_at',{ascending:false}).limit(30);
    p.innerHTML=(data&&data.length)
      ?data.map(m=>`<div class="mem-it"><span class="mem-k">${JUMP.esc(m.chave)}</span><span>${JUMP.esc(m.valor)}</span></div>`).join('')
      :'<div style="font-family:var(--M);font-size:11px;color:var(--t3)">Ainda não aprendi nada — me conta sobre seu negócio!</div>';
    p.classList.add('show');
  }catch(e){}
}
/* textarea auto-grow + Enter envia */
const inp=document.getElementById('inp');
inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(120,inp.scrollHeight)+'px'});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviar()}});
</script>
</body>
