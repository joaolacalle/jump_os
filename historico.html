<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JUMP OS — Histórico</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@400;500;600;700&family=Barlow:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/jump-ui.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
<div class="grain"></div>
<div class="loading" id="loading"><div class="ld-spin"></div><div class="ld-t">Carregando histórico...</div></div>
<div class="app">
<main class="main">
  <div class="hd">
    <div><div class="hd-hello">Histórico</div><h1 class="hd-h">Tudo que já <em>rodou.</em></h1></div>
    <select class="f-select" id="filtro" style="max-width:200px" onchange="render()">
      <option value="">Todos os status</option>
      <option value="publicado">Publicados</option>
      <option value="aprovado">Aprovados</option>
      <option value="baixado">Baixados</option>
      <option value="rejeitado">Rejeitados</option>
    </select>
  </div>
  <div class="stats" style="margin-bottom:18px">
    <div class="stat"><div class="st-n" id="st-pub">0</div><div class="st-l">Publicados</div></div>
    <div class="stat"><div class="st-n" id="st-apr">0</div><div class="st-l">Aprovados</div></div>
    <div class="stat"><div class="st-n" id="st-bax">0</div><div class="st-l">Baixados</div></div>
    <div class="stat"><div class="st-n" id="st-rej" style="color:var(--red)">0</div><div class="st-l">Rejeitados</div></div>
  </div>
  <div class="tbl-wrap">
    <table>
      <thead><tr><th>Conteúdo</th><th>Formato</th><th>Status</th><th>Data</th></tr></thead>
      <tbody id="tbody"><tr><td colspan="4" style="text-align:center;font-family:var(--M);font-size:12px">Carregando...</td></tr></tbody>
    </table>
  </div>
</main>
</div>
<script src="assets/jump-core.js"></script>
<script>
let ITENS=[];
(async()=>{
  try{
    JUMP.sidebar('historico');
    const CTX=await JUMP.guard();
    JUMP.setUser(CTX.viewCliente||CTX.cliente,CTX.user);
    try{
      const{data}=await JUMP.sb.from('conteudos').select('*').eq('user_id',CTX.viewId||CTX.user.id).neq('status','rascunho').neq('status','excluido').order('created_at',{ascending:false}).limit(200);
      ITENS=data||[];
    }catch(e){}
    ['publicado','aprovado','baixado','rejeitado'].forEach((s,i)=>{
      document.getElementById(['st-pub','st-apr','st-bax','st-rej'][i]).textContent=ITENS.filter(x=>x.status===s).length;
    });
    render();
    document.getElementById('loading').classList.add('hide');
  }catch(e){}
})();
function render(){
  const f=document.getElementById('filtro').value;
  const rows=ITENS.filter(i=>!f||i.status===f);
  const tb=document.getElementById('tbody');
  if(!rows.length){tb.innerHTML='<tr><td colspan="4" style="text-align:center;font-family:var(--M);font-size:12px">Nada por aqui ainda. Seu histórico cresce conforme os agentes trabalham.</td></tr>';return}
  const P={publicado:'pill-g',aprovado:'pill-c',baixado:'pill-c',rejeitado:'pill-r'};
  tb.innerHTML=rows.map(c=>`<tr>
    <td><strong>${JUMP.esc(c.tema||'Conteúdo')}</strong></td>
    <td style="font-family:var(--M);font-size:12px">${JUMP.esc(c.formato||'post')}</td>
    <td><span class="pill ${P[c.status]||'pill-y'}">${JUMP.esc(c.status)}</span></td>
    <td style="font-family:var(--M);font-size:12px">${c.created_at?new Date(c.created_at).toLocaleDateString('pt-BR'):'—'}</td>
  </tr>`).join('');
}
</script>
</body>
</html>
